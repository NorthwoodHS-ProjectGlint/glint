name: Build Examples

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

jobs:
  build:
    name: Build Glint Examples
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            build-essential \
            pkg-config \
            libglfw3-dev \
            libcjson-dev \
            libstb-dev

      - name: Configure Glint library & examples (CMake)
        run: cmake -B _build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build Glint library, tools, bootloader & examples
        run: cmake --build _build --parallel $(nproc)

      # ── Staged install ──────────────────────────────────────────────────────
      - name: Stage install into dist/
        run: |
          cmake --install _build --prefix "$GITHUB_WORKSPACE/dist"

      # ── Bootloader ─────────────────────────────────────────────────────────
      # The bootloader CMakeLists.txt has no install() rule, so we copy it
      # manually from the build tree into dist/bin/.
      - name: Copy bootloader into dist/bin/
        run: |
          mkdir -p dist/bin
          BOOTLOADER="_build/system/bootloader/bootloader"
          if [ -f "$BOOTLOADER" ]; then
            cp "$BOOTLOADER" dist/bin/bootloader
            echo "Copied bootloader to dist/bin/bootloader"
          else
            echo "ERROR: bootloader binary not found at $BOOTLOADER" >&2
            exit 1
          fi

      # Patch the pkg-config prefix so it reflects wherever a user extracts the
      # archive (they can override PKG_CONFIG_PATH at build time if needed).
      - name: Patch glint.pc prefix
        run: |
          PC="$GITHUB_WORKSPACE/dist/lib/pkgconfig/glint.pc"
          if [ -f "$PC" ]; then
            sed -i "s|^prefix=.*|prefix=\${pcfiledir}/../..|" "$PC"
            echo "Patched glint.pc:"
            cat "$PC"
          fi

      # ── Example .glt files ─────────────────────────────────────────────────
      - name: Collect built .glt artifacts into dist/titles/
        run: |
          mkdir -p dist/titles
          find . -name "*.glt" ! -path "./_build/*" ! -path "./dist/*" \
            -exec cp {} dist/titles/ \;
          find _build -name "*.glt" \
            -exec cp {} dist/titles/ \; 2>/dev/null || true
          echo "Collected .glt files:"
          ls -lh dist/titles/ || echo "(none found)"

      # ── Archive ────────────────────────────────────────────────────────────
      - name: Create glint-dist.tar.gz
        run: |
          tar -czf glint-dist.tar.gz -C dist .
          echo "Archive contents:"
          tar -tzf glint-dist.tar.gz

      # ── Upload artifacts ───────────────────────────────────────────────────
      - name: Upload glint distribution archive
        uses: actions/upload-artifact@v4
        with:
          name: glint-dist
          path: glint-dist.tar.gz
          if-no-files-found: error
          retention-days: 30

      - name: Upload bootloader binary (standalone)
        uses: actions/upload-artifact@v4
        with:
          name: glint-bootloader
          path: dist/bin/bootloader
          if-no-files-found: error
          retention-days: 30

      - name: Upload example .glt files (standalone)
        uses: actions/upload-artifact@v4
        with:
          name: glint-examples
          path: dist/titles/*.glt
          if-no-files-found: warn
          retention-days: 30
