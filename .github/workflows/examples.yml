name: Build Examples

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

jobs:
  build:
    name: Build Glint for Raspberry Pi 4B (aarch64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install cross-compilation tools and dependencies
        run: |
          # Enable arm64 foreign architecture
          sudo dpkg --add-architecture arm64

          # Restrict ALL existing sources to amd64 only
          sudo sed -i 's/^Types: deb$/Types: deb/' /etc/apt/sources.list.d/ubuntu.sources 2>/dev/null || true
          sudo sed -i '/^Architectures:/d' /etc/apt/sources.list.d/ubuntu.sources 2>/dev/null || true
          sudo sed -i '/^Types: deb/a Architectures: amd64' /etc/apt/sources.list.d/ubuntu.sources 2>/dev/null || true
          # Also handle legacy sources.list format if present
          sudo sed -i 's/^deb http/deb [arch=amd64] http/' /etc/apt/sources.list 2>/dev/null || true

          # Add arm64-only sources pointing at ports.ubuntu.com (noble = 24.04)
          sudo tee /etc/apt/sources.list.d/arm64-ports.list > /dev/null <<'EOF'
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-security main restricted universe multiverse
          EOF

          sudo apt-get update

          # Native build tools (amd64)
          sudo apt-get install -y \
            cmake \
            build-essential \
            pkg-config \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu

          # Target libraries — aarch64 (arm64) variants
          sudo apt-get install -y \
            libglfw3-dev:arm64 \
            libcjson-dev:arm64 \
            libstb-dev:arm64

          # install libraries for x86_64 native build (for glt_execcreate)
          sudo apt-get install -y \
            libglfw3-dev \
            libcjson-dev \
            libstb-dev

      # ── Stage 0: Build native glt_execcreate tool ──────────────────────────
      - name: Build native glt_execcreate tool (x86_64)
        run: |
          cmake -B _build-native -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DGLINT_BUILD_EXAMPLES=OFF
          cmake --build _build-native --target glt_execcreate --parallel $(nproc)
          sudo cp _build-native/tools/glt_execcreate/glt_execcreate /usr/local/bin/
          which glt_execcreate

      # ── Stage 1: Build and install core library (without examples) ─────────
      - name: Configure Glint core library for aarch64
        run: |
          cmake --preset rpi4-aarch64 -DGLINT_BUILD_EXAMPLES=OFF \
            -DPKG_CONFIG_EXECUTABLE=/usr/bin/pkg-config \
            -DCMAKE_PREFIX_PATH=/usr/lib/aarch64-linux-gnu
        env:
          PKG_CONFIG_PATH: /usr/lib/aarch64-linux-gnu/pkgconfig
          PKG_CONFIG_LIBDIR: /usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig
          PKG_CONFIG_SYSROOT_DIR: /

      - name: Build Glint core library for aarch64
        run: |
          cmake --build --preset rpi4-aarch64 --parallel $(nproc)

      - name: Install Glint library to staging area
        run: |
          cmake --install _build-rpi4 --prefix "$GITHUB_WORKSPACE/dist"

      # ── Stage 2: Build examples (now that library is installed) ────────────
      - name: Reconfigure Glint with examples for aarch64
        run: |
          cmake --preset rpi4-aarch64 \
            -DGLINT_BUILD_EXAMPLES=ON \
            -DCMAKE_PREFIX_PATH="$GITHUB_WORKSPACE/dist:/usr/lib/aarch64-linux-gnu" \
            -DPKG_CONFIG_EXECUTABLE=/usr/bin/pkg-config
        env:
          PKG_CONFIG_PATH: /usr/lib/aarch64-linux-gnu/pkgconfig:${{ github.workspace }}/dist/lib/pkgconfig
          PKG_CONFIG_LIBDIR: /usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig
          PKG_CONFIG_SYSROOT_DIR: /

      - name: Build Glint examples for aarch64
        run: |
          cmake --build --preset rpi4-aarch64 --parallel $(nproc)

      # ── Staged install ──────────────────────────────────────────────────────
      # Core library is already installed above, no need to reinstall

      # ── Bootloader ─────────────────────────────────────────────────────────
      # The bootloader CMakeLists.txt has no install() rule, so we copy it
      # manually from the build tree into dist/bin/.
      - name: Copy bootloader into dist/bin/
        run: |
          mkdir -p dist/bin
          BOOTLOADER="_build-rpi4/system/bootloader/bootloader"
          if [ -f "$BOOTLOADER" ]; then
            cp "$BOOTLOADER" dist/bin/bootloader
            echo "Copied bootloader to dist/bin/bootloader"
          else
            echo "ERROR: bootloader binary not found at $BOOTLOADER" >&2
            exit 1
          fi

      # Patch the pkg-config prefix so it reflects wherever a user extracts the
      # archive (they can override PKG_CONFIG_PATH at build time if needed).
      - name: Patch glint.pc prefix
        run: |
          PC="$GITHUB_WORKSPACE/dist/lib/pkgconfig/glint.pc"
          if [ -f "$PC" ]; then
            sed -i "s|^prefix=.*|prefix=\${pcfiledir}/../..|" "$PC"
            echo "Patched glint.pc:"
            cat "$PC"
          fi

      # ── Example .glt files ─────────────────────────────────────────────────
      - name: Collect built .glt artifacts into dist/titles/
        run: |
          mkdir -p dist/titles
          # Copy pre-existing .glt files from source tree
          find . -name "*.glt" \
            ! -path "./_build-rpi4/*" \
            ! -path "./dist/*" \
            -exec cp {} dist/titles/ \; 2>/dev/null || true
          # Copy built .glt files from build directory
          find _build-rpi4 -name "*.glt" -exec cp {} dist/titles/ \; 2>/dev/null || true
          echo "Collected .glt files:"
          ls -lh dist/titles/ || echo "(none found)"

      # ── Package installation files ─────────────────────────────────────────
      - name: Add installation script and README
        run: |
          cp install-rpi.sh dist/
          cp README-RPI.md dist/README.md
          chmod +x dist/install-rpi.sh
          echo "Added installation files"

      # ── Unified Archive ───────────────────────────────────────────────────
      - name: Create unified glint-rpi4-aarch64.zip
        run: |
          cd dist
          zip -r ../glint-rpi4-aarch64.zip .
          echo "Archive contents:"
          unzip -l ../glint-rpi4-aarch64.zip

      # ── Upload unified artifact ────────────────────────────────────────────
      - name: Upload unified Glint distribution (RPi 4B aarch64)
        uses: actions/upload-artifact@v4
        with:
          name: glint-rpi4-aarch64
          path: glint-rpi4-aarch64.zip
          if-no-files-found: error
          retention-days: 30
